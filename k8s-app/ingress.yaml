apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 3tier-ingress
  namespace: 3tier-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # For demonstrating full load balancing, you might add annotations here
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
